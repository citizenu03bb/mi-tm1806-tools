name: checks

on:
  push:
  pull_request:

jobs:
  generic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Python compile
        run: |
          python3 -m py_compile \
            effects/kbdctl.py \
            effects/mi_tm1806_sysfs.py \
            effects/audiovisualizer.py \
            effects/editor.py \
            hotkey/daemon.py \
            tests/test_kbdctl.py \
            tests/test_sysfs_backend.py \
            tests/test_hotkey_events.py

      - name: Unit tests
        run: python3 -m unittest discover

      - name: Bash syntax
        run: bash -n effects/rgbkb-effects rgbkb/rgbkb integrations/claude-code/keyboard-status.sh

      - name: Public path sanity
        run: |
          python3 - <<'PY'
          import subprocess
          import sys
          bad = ["/home/" + "pat", "not yet on GitHub", "Future direction: kernel module"]
          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          failed = False
          for path in files:
              try:
                  text = open(path, encoding="utf-8").read()
              except UnicodeDecodeError:
                  continue
              for needle in bad:
                  if needle in text:
                      print(f"{path}: contains {needle!r}")
                      failed = True
          sys.exit(1 if failed else 0)
          PY
